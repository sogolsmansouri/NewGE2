model:
  learning_task: LINK_PREDICTION
  encoder:
    layers:
      - - type: EMBEDDING
          output_dim: 100
  decoder:
    type: DISTMULT
    options:
      input_dim: 100
  loss:
    type: SOFTMAX_CE
    options:
      reduction: SUM
  dense_optimizer:
    type: ADAGRAD
    options:
      learning_rate: 0.1
  sparse_optimizer:
    type: ADAGRAD
    options:
      learning_rate: 0.1

storage:
  device_type: cuda
  dataset:
    # Point this at a Twitter 16p dataset directory that contains:
    # - train_edges.bin
    # - valid_edges.bin with 10,000 edges
    # - test_edges.bin with 10,000 edges
    dataset_dir: ./datasets/twitter_16p_paper_10k_eval
  edges:
    type: HOST_MEMORY
    options:
      dtype: int
  embeddings:
    type: MEM_PARTITION_BUFFER
    options:
      dtype: float
      num_partitions: 16
      buffer_capacity: 4
      prefetching: false
      fine_to_coarse_ratio: 1
      num_cache_partitions: 0
      edge_bucket_ordering: CUSTOM
      randomly_assign_edge_buckets: false
  prefetch: false
  shuffle_input: true
  full_graph_evaluation: true

training:
  batch_size: 50000
  negative_sampling_method: RNS
  negative_sampling:
    num_chunks: 50
    negatives_per_positive: 1000
    # GE2 paper says Twitter used a hybrid of RNS and DegreeNS, but the
    # report text in this repo does not specify the mixture ratio. The
    # current codebase exposes that hybrid through degree_fraction.
    degree_fraction: 0.5
    filtered: false
  num_epochs: 10
  epochs_per_shuffle: 1
  dense_sync_batches: 1
  save_model: true

evaluation:
  # Keep evaluation out of the training runtime path. Run the separate
  # paper eval config with gege_eval after training completes.
  epochs_per_eval: 0
  batch_size: 1000
  negative_sampling:
    filtered: true
